<!DOCTYPE html>
<html>
<head>
<title>Fly Ticket Booking</title>
<style>
body{
font-family: Arial;
background:#e6f2ff;
text-align:center;
}

.container{
background:white;
padding:20px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input,select{
width:90%;
padding:10px;
margin:5px;
}

button{
background:#007bff;
color:white;
padding:10px;
border:none;
width:95%;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>
</head>

<body>

<h1>✈️ Fly Ticket Booking</h1>

<div class="container">

<label>From</label>
<input type="text" placeholder="City">

<label>To</label>
<input type="text" placeholder="Destination">

<label>Date</label>
<input type="date">

<label>Passengers</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<button>Book Ticket</button>

</div>

</body>
</html>
